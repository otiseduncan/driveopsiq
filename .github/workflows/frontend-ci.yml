name: frontend-ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify npm version and clear cache
        run: |
          npm --version
          npm cache clean --force
        working-directory: frontend

      - name: Verify package files and install dependencies
        run: |
          echo "Checking package.json and package-lock.json..."
          ls -la package.json package-lock.json
          echo "Attempting npm ci..."
          if ! npm ci; then
            echo "npm ci failed, trying npm install instead..."
            npm install
            echo "npm install completed"
          fi
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
